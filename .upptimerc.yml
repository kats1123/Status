# ===============================
# Upptime Configuration
# ===============================
owner: kats1123
repo: Status

skipDeleteIssues: true
workflowSchedule:
  uptime: "*/5 * * * *" 

sites:
  - name: Network
    url: "$NETWORK_CHECK_URL"
    slug: home-network-check

  - name: Server
    url: "$SERVER_URL"
    slug: server

  - name: AIOMetadata (Search)
    url: "$AIOMETADATA_URL"
    slug: aio-metadata

  - name: AIOStreams (Links)
    url: "$AIOSTREAMS_URL"
    slug: aio-streams

  - name: Comet (🏠)
    url: "$COMET_URL"
    slug: comet

  - name: StremThru Torz/Proxy (🧲)
    url: "$STREMTHRU_URL"
    slug: strem-thru-torz-proxy

status-website:
  cname: status.jonakats.com
  name: "Streaming Service Status"
  introTitle: "Service Status"
  introMessage: |
    Live uptime and latency for my mostly self-hosted streaming service backend.
    <br><br>
    If all systems are operational, and it is still not working, please check <a href="https://debridmediamanager.com/is-real-debrid-down-or-just-me" target="_blank" style="color: #f25287; text-decoration: underline; font-weight: bold;">Real Debrid and Torrentio (☁️) status here</a> and <a href="https://status.debridio.com/" target="_blank" style="color: #f25287; text-decoration: underline; font-weight: bold;">Debridio (🌐) status here</a>.
  logoUrl: https://publicfiles.jonakats.com/Images/omni.png
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/kats1123/Status

